<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断页面</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #764ba2; }
        #log { background: #000; color: #0f0; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .error { color: #f99; border-left: 3px solid #f00; padding-left: 10px; }
        .success { color: #9f9; border-left: 3px solid #0f0; padding-left: 10px; }
    </style>
</head>
<body>
    <h1>🔍 问题诊断</h1>
    
    <div class="section">
        <h2>测试 1：标签切换</h2>
        <button onclick="testTab('convert')">切换到 Excel 转 HTML</button>
        <button onclick="testTab('merge')">切换到 Excel 合并</button>
        <div id="tabResult"></div>
    </div>
    
    <div class="section">
        <h2>测试 2：文件上传显示</h2>
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <div id="fileResult"></div>
    </div>
    
    <div class="section">
        <h2>日志输出</h2>
        <div id="log"></div>
    </div>
    
    <script>
        function log(msg, type) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (type === 'error') entry.className = 'error';
            if (type === 'success') entry.className = 'success';
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type || 'INFO'}]`, msg);
        }
        
        function testTab(tabId) {
            log('开始测试标签切换：' + tabId);
            
            try {
                // 方法 1：直接操作 DOM
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                
                const targetBtn = document.querySelector(`[data-tab="${tabId}"]`);
                const targetContent = document.getElementById(`${tabId}-tab`);
                
                if (targetBtn && targetContent) {
                    targetBtn.classList.add('active');
                    targetContent.classList.add('active');
                    log(`✅ 标签切换成功：${tabId}`, 'success');
                    document.getElementById('tabResult').innerHTML = '<span style="color:green">✅ 切换成功</span>';
                } else {
                    log(`❌ 找不到目标元素：btn=${targetBtn ? 'Y' : 'N'}, content=${targetContent ? 'Y' : 'N'}`, 'error');
                    document.getElementById('tabResult').innerHTML = '<span style="color:red">❌ 元素未找到</span>';
                }
            } catch (e) {
                log(`❌ 错误：${e.message}`, 'error');
                document.getElementById('tabResult').innerHTML = `<span style="color:red">❌ ${e.message}</span>`;
            }
        }
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            log('文件选择事件触发');
            if (this.files.length > 0) {
                const file = this.files[0];
                log(`文件：${file.name}, 大小：${(file.size/1024).toFixed(2)}KB`, 'success');
                
                // 显示文件信息
                const resultDiv = document.getElementById('fileResult');
                resultDiv.innerHTML = `
                    <div style="background:linear-gradient(135deg,#43e97b,#38f9d7);padding:15px;border-radius:10px;margin-top:10px;">
                        <strong>✅ ${file.name}</strong><br>
                        大小：${(file.size/1024).toFixed(2)} KB | 
                        类型：${file.type || 'Excel 文件'} | 
                        时间：${new Date().toLocaleTimeString()}
                    </div>
                `;
                log('文件信息显示成功', 'success');
            }
        });
        
        window.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成', 'success');
            log(`标签按钮数量：${document.querySelectorAll('.tab-btn').length}`);
            log(`标签内容数量：${document.querySelectorAll('.tab-content').length}`);
            log(`MergeModule: ${typeof window.MergeModule !== 'undefined' ? '已加载' : '未加载'}`);
        });
        
        window.addEventListener('error', function(e) {
            log(`全局错误：${e.message}`, 'error');
        });
    </script>
    
    <!-- 加载完整页面元素 -->
    <div class="tabs-container" style="display:none;">
        <button class="tab-btn active" data-tab="convert">Excel 转 HTML</button>
        <button class="tab-btn" data-tab="merge">Excel 合并</button>
    </div>
    <div id="convert-tab" class="tab-content" style="display:none;"></div>
    <div id="merge-tab" class="tab-content" style="display:none;"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="utils.js"></script>
    <script src="app-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
